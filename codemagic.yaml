workflows:
  ios-workflow:
    working_directory: mobile
    name: iOS Build (TestFlight)
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - vocal_walls
      vars:
        XCODE_WORKSPACE: "ios/VocalWallsMobile.xcworkspace"
        XCODE_SCHEME: "VocalWallsMobile"
        EXPO_PUBLIC_API_BASE_URL: "http://31.97.77.6:4000"
    scripts:
      - name: Install dependencies
        script: npm install

      - name: Expo Prebuild
        script: npx expo prebuild --platform ios

      - name: Debug - Check env vars
        script: |
          echo "Checking CM_CERTIFICATE length: ${#CM_CERTIFICATE}"
          echo "Checking CM_PROVISIONING_PROFILE length: ${#CM_PROVISIONING_PROFILE}"
          echo "Checking CM_CERTIFICATE_PASSWORD set: $([ -n "$CM_CERTIFICATE_PASSWORD" ] && echo YES || echo NO)"

      - name: Initialize Keychain
        script: |
          keychain initialize
          # If CM_CERTIFICATE is set, manually write it to the expected location
          if [ -n "$CM_CERTIFICATE" ]; then
            echo "Certificate found in env var, writing to disk..."
            mkdir -p ~/Library/MobileDevice/Certificates
            echo "$CM_CERTIFICATE" | base64 --decode > ~/Library/MobileDevice/Certificates/dist.p12
            echo "Certificate written successfully"
          else
            echo "WARNING: CM_CERTIFICATE is empty or not set!"
          fi
          # If CM_PROVISIONING_PROFILE is set, write it too
          if [ -n "$CM_PROVISIONING_PROFILE" ]; then
            echo "Provisioning profile found, writing to disk..."
            mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
            PROFILE_UUID=$(echo "$CM_PROVISIONING_PROFILE" | base64 --decode | grep -aA1 UUID | grep -o '[-a-zA-Z0-9]\{36\}')
            echo "$CM_PROVISIONING_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/${PROFILE_UUID}.mobileprovision
            echo "Provisioning profile written: ${PROFILE_UUID}"
          fi
          keychain add-certificates --certificate-password="$CM_CERTIFICATE_PASSWORD"

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Set Build Number
        script: |
          cd ios
          agvtool new-version -all $BUILD_NUMBER

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
      email:
        recipients:
          - nicolas@example.com
        notify:
          success: true
          failure: true

  android-workflow:
    working_directory: mobile
    name: Android Build (Play Store)
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - vocal_walls
      vars:
        EXPO_PUBLIC_API_BASE_URL: "http://31.97.77.6:4000"
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Expo Prebuild
        script: npx expo prebuild --platform android
      - name: Build Android Bundle
        script: |
          cd android
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
    publishing:
      email:
        recipients:
          - nicolas@example.com
        notify:
          success: true
          failure: true
