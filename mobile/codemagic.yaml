workflows:
  ios-workflow:
    working_directory: mobile
    name: iOS Build (TestFlight)
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      # Upload these to Codemagic App Settings > Environment variables
      # CM_CERTIFICATE: (Upload dist.p12)
      # CM_CERTIFICATE_PASSWORD: (Leave blank if no password, or set value)
      # CM_PROVISIONING_PROFILE: (Upload Vocal_Walls_App_Store.mobileprovision)
      groups:
        - manual_code_signing
      vars:
        # Check generated name after local prebuild if unsure, commonly PascalCase of app.json "name"
        XCODE_WORKSPACE: "ios/VocalWallsMobile.xcworkspace" 
        XCODE_SCHEME: "VocalWallsMobile"
    scripts:
      - name: Install dependencies
        script: npm install
      
      - name: Expo Prebuild
        script: npx expo prebuild --platform ios
      
      - name: Initialize Keychain
        script: |
          keychain initialize
          keychain add-certificates
      
      - name: Set Build Number
        script: |
          # Sync build number with Codemagic's counter or app.json
          cd ios
          agvtool new-version -all $BUILD_NUMBER
      
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - nicolas@example.com # Update with your email
        notify:
          success: true
          failure: true
